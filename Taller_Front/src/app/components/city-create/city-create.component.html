<div class="card mb-4">
  <div class="card-body">
    <h5 class="card-title">Nueva Ciudad</h5>

    <div class="mb-3">
      <label class="form-label" for="cityName">Nombre de la ciudad</label>
      <input
        id="cityName"
        type="text"
        class="form-control"
        [(ngModel)]="cityName"
        placeholder="Ej: Medellín"
      />
    </div>

    <div class="mb-3">
      <label class="form-label" for="countrySelect">País</label>
      <select
        id="countrySelect"
        class="form-select"
        [(ngModel)]="selectedCountryId"
      >
        <option [ngValue]="null" disabled>-- Seleccione un país --</option>
        @for (country of countries; track country.id) {
          <option [ngValue]="country.id">{{ country.name }}</option>
        }
      </select>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-success" [disabled]="!isValid" (click)="save()">
        Guardar
      </button>
      <button class="btn btn-outline-secondary" (click)="cancel.emit()">
        Cancelar
      </button>
    </div>
  </div>
</div>
